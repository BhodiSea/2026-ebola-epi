name: E2E

on:
  deployment_status:

jobs:
  e2e:
    name: Playwright (${{ matrix.shard }}/4)
    if: >-
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment, 'Preview')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ituri/web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @ituri/web exec playwright test --shard=${{ matrix.shard }}/4
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}

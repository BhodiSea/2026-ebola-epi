name: DB Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  db-test:
    name: DB Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (pglast)
        run: pip install -r requirements.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: supabase start

      - name: Validate SQL migrations (pglast)
        run: pnpm db:lint

      - name: Run pgTAP tests
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop

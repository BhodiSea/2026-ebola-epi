# promptfoo evaluation config for the ituri-sitrep extraction prompt.
# Run offline (fixtures only): pnpm --filter @ituri/evals test
# Run live (Anthropic API, nightly CI): pnpm --filter @ituri/evals eval

description: "Extraction prompt F1 evaluation — multi-pathogen gold set (7 contexts)"

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      cache: true
      max_tokens: 4096
      tool_choice:
        type: tool
        name: extract_case_counts

prompts:
  - file://../packages/extract/src/prompt.ts:STATIC_INSTRUCTIONS

defaultTest:
  assert:
    - type: javascript
      value: |
        const { computeF1 } = require('./lib/f1.js');
        const expected = JSON.parse(require('fs').readFileSync(
          `gold-set/${context.vars.fixture}/ground-truth.json`, 'utf8'
        ));
        const rows = output.extractions ?? [];
        const actual = rows.map(r => ({
          pathogen_icd11: r.pathogen_icd11,
          country_iso3: r.country_iso3,
          metric: r.metric,
          value: r.value,
          as_of: r.as_of,
        }));
        const { f1 } = computeF1(expected, actual);
        return { pass: f1 >= 0.95, score: f1, reason: `F1=${f1.toFixed(3)}` };

tests:
  - vars:
      fixture: bundibugyo-ituri-2026-04-20
      document: file://gold-set/bundibugyo-ituri-2026-04-20/source.txt
  - vars:
      fixture: no-confirmed-figures
      document: file://gold-set/no-confirmed-figures/source.txt
  - vars:
      fixture: cholera-cod-2024
      document: file://gold-set/cholera-cod-2024/source.txt
  - vars:
      fixture: ebola-sudan-ssd-2022
      document: file://gold-set/ebola-sudan-ssd-2022/source.txt
  - vars:
      fixture: ebola-zaire-cod-2019
      document: file://gold-set/ebola-zaire-cod-2019/source.txt
  - vars:
      fixture: marburg-tz-2026-05-01
      document: file://gold-set/marburg-tz-2026-05-01/source.txt
  - vars:
      fixture: mpox-cod-2023
      document: file://gold-set/mpox-cod-2023/source.txt

name: LLM Eval

on:
  schedule:
    - cron: "0 4 * * *"

jobs:
  eval:
    name: Nightly LLM Eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check eval config exists
        run: |
          test -f evals/promptfoo.config.yaml || (echo "No eval config yet — skipping" && exit 0)

      - name: Run LLM evals
        run: pnpm exec promptfoo eval --config evals/promptfoo.config.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

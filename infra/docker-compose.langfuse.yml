# Self-hosted Langfuse stack for local development / staging.
# Production deployment is out of scope for Phase 7.
#
# Usage:
#   1. cp infra/.env.langfuse.example infra/.env.langfuse
#   2. Fill in the values in infra/.env.langfuse
#   3. docker compose -f infra/docker-compose.langfuse.yml --env-file infra/.env.langfuse up -d
#
# infra/.env.langfuse is gitignored — never commit credentials.

version: "3.9"

services:
  langfuse-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
    volumes:
      - langfuse_ch_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - langfuse_redis_data:/data

  langfuse-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD}
    volumes:
      - langfuse_minio_data:/data

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      MINIO_ENDPOINT: langfuse-minio:9000
      MINIO_ACCESS_KEY_ID: langfuse
      MINIO_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
      REDIS_HOST: langfuse-redis
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3001

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      DIRECT_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      MINIO_ENDPOINT: langfuse-minio:9000
      MINIO_ACCESS_KEY_ID: langfuse
      MINIO_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
      REDIS_HOST: langfuse-redis
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3001

volumes:
  langfuse_pg_data:
  langfuse_ch_data:
  langfuse_redis_data:
  langfuse_minio_data:

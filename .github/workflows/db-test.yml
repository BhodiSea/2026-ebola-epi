name: DB + integration tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  db-test:
    name: DB + integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (pglast)
        run: pip install -r requirements.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: supabase start

      - name: Validate SQL migrations (pglast)
        run: pnpm db:lint

      - name: Run pgTAP tests
        run: supabase test db

      - name: Export local stack env
        run: |
          # db reset applies any migrations not yet in the running stack and re-seeds.
          # In CI the stack is always fresh, so this is a fast no-op equivalent.
          supabase db reset
          eval "$(supabase status --output env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "POSTGRES_URL_NON_POOLING=$DB_URL" >> $GITHUB_ENV

      - name: Integration tests
        run: pnpm test:integration
        env:
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          INNGEST_EVENT_KEY: ci-placeholder
          INNGEST_SIGNING_KEY: signkey-ci-placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Stop Supabase
        if: always()
        run: supabase stop

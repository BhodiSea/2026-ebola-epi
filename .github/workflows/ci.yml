name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: No-PHI scan
        run: |
          if git diff origin/main...HEAD | grep -iE '\b(DOB|MRN|SSN|Patient [A-Z])\b'; then
            echo "PHI detected in diff — aborting"
            exit 1
          fi

      - name: Biome check
        run: pnpm exec biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit
        run: pnpm audit --audit-level=high

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/today
            http://localhost:3000/outbreaks
            http://localhost:3000/methods
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: false

  axe-core:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start server
        run: pnpm --filter web start &

      - name: Wait for :3000
        run: timeout 60 bash -c 'until curl -fs http://localhost:3000 > /dev/null; do sleep 2; done'

      - name: Run axe-core against key routes
        run: |
          VIOLATIONS=0
          for URL in \
            "http://localhost:3000/today" \
            "http://localhost:3000/outbreaks" \
            "http://localhost:3000/methods" \
            "http://localhost:3000/map?view=table"; do
            COUNT=$(npx @axe-core/cli "$URL" --reporter json 2>/dev/null | \
              jq '[.[] | .violations[] | select(.impact == "critical" or .impact == "serious")] | length' || echo 0)
            echo "$URL — $COUNT critical/serious violation(s)"
            VIOLATIONS=$((VIOLATIONS + COUNT))
          done
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::axe-core: $VIOLATIONS critical/serious violations across audited routes"
            exit 1
          fi

  types-drift:
    name: Supabase types drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check generated types match committed file
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase gen types typescript --linked > /tmp/types.gen.ts
          diff /tmp/types.gen.ts packages/db/src/types.gen.ts

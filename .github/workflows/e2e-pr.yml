name: E2E (PR)

on:
  pull_request:

jobs:
  e2e:
    name: Playwright (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ituri/web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @ituri/web exec playwright test --shard=${{ matrix.shard }}/4
        env:
          CI: "true"
          # globalSetup boots the DB and dev server; keep base URL pointing at localhost.
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

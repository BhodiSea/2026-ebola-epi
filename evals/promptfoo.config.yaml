  # ── Triage gold set (4 fixtures) ─────────────────────────────────────────────
  - vars:
      triage_fixture: who-don-bundibugyo
      document: file://triage-gold-set/who-don-bundibugyo/source.txt
    provider: triage
    assert:
      - type: javascript
        value: |
          const gt = JSON.parse(require('fs').readFileSync(
            `triage-gold-set/${context.vars.triage_fixture}/ground-truth.json`, 'utf8'
          ));
          const pass = output.is_outbreak === gt.is_outbreak &&
            (!gt.is_outbreak || output.pathogen_icd11 === gt.pathogen_icd11);
          return { pass, score: pass ? 1 : 0,
            reason: `is_outbreak=${output.is_outbreak} pathogen=${output.pathogen_icd11 ?? 'n/a'}` };


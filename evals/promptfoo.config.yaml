# promptfoo evaluation config for the ituri-sitrep extraction and triage prompts.
# Run offline (fixtures only): pnpm --filter @ituri/evals test
# Run live (Anthropic API, nightly CI): pnpm --filter @ituri/evals eval

description: "Extraction F1 + triage accuracy evaluation — multi-pathogen gold sets"

providers:
  - id: extraction
    label: extraction
    config:
      provider: anthropic:messages:claude-sonnet-4-6
      cache: true
      max_tokens: 4096
      tool_choice:
        type: tool
        name: extract_case_counts

  - id: triage
    label: triage
    config:
      provider: anthropic:messages:claude-haiku-4-5-20251001
      cache: true
      max_tokens: 256
      tool_choice:
        type: tool
        name: classify_document

prompts:
  - id: extraction-prompt
    label: extraction
    provider: extraction
    file: file://../packages/extract/src/prompt.ts:STATIC_INSTRUCTIONS

  - id: triage-prompt
    label: triage
    provider: triage
    file: file://../packages/extract/src/agents/triage-prompt.ts:TRIAGE_SYSTEM

tests:
  # ── Extraction gold set (7 fixtures) ────────────────────────────────────────
  - vars:
      fixture: bundibugyo-ituri-2026-04-20
      document: file://gold-set/bundibugyo-ituri-2026-04-20/source.txt
    provider: extraction
    assert:
      - type: javascript
        value: |
          const { computeF1 } = require('./lib/f1.js');
          const expected = JSON.parse(require('fs').readFileSync(
            `gold-set/${context.vars.fixture}/ground-truth.json`, 'utf8'
          ));
          const rows = output.extractions ?? [];
          const actual = rows.map(r => ({
            pathogen_icd11: r.pathogen_icd11, country_iso3: r.country_iso3,
            metric: r.metric, value: r.value, as_of: r.as_of,
          }));
          const { f1 } = computeF1(expected, actual);
          return { pass: f1 >= 0.95, score: f1, reason: `F1=${f1.toFixed(3)}` };

